name: Theme Release

on:
  push:
    tags:
      - "v*"
      - "pages@v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: packages install
        run: |
          cd __everkm
          make pnpm-install
          cd theme/youlog
          make fe-install

      - name: dist pages
        if: startsWith(github.ref, 'refs/tags/pages@v')
        run: |
          cd __everkm && make dist

      - uses: stefanzweifel/git-auto-commit-action@v5
        if: startsWith(github.ref, 'refs/tags/pages@v')
        with:
          commit_message: "${{ github.ref }} dist results, sha: ${{ github.sha }}"
          branch: refs/heads/pages
          repository: __everkm/dist/
          status_options: '--untracked-files=normal'
          add_options: '--force'
          push_options: '--force'
          skip_dirty_check: true
          skip_fetch: true
          skip_checkout: true
          disable_globbing: true
          create_branch: true

      - name: build theme
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          export EVERKM_VERSION=$(echo ${{ github.ref }} | sed -n 's/refs\/tags\/v\(.*\)/\1/p')
          echo "VERSION=$EVERKM_VERSION" >> $GITHUB_ENV
          cd __everkm/theme/youlog && make bundle

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          body: TODO New Release.
          draft: false
          prerelease: true
          files: |
            __everkm/theme/youlog/youlog-${{ env.VERSION }}.zip
